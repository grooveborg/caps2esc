name: Build caps2esc

on:
  push:
    branches:
      - main
      - 'develop/**'
    paths-ignore:
      - "**.md"
  repository_dispatch:
    types: [release.created]

jobs:
  build:
    name: Build caps2esc
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set caps2esc version
        if: github.event_name == 'push'
        run: |
          latest_tag=$(curl -fsS https://gitlab.com/api/v4/projects/3772371/repository/tags | jq -r '.[0] | .name')
          echo "VERSION=$latest_tag" >> "$GITHUB_ENV"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          file: Containerfile
          push: true
          tags: |
            ${{ vars.REGISTRY }}/${{ github.repository }}:${{ github.event_name == 'push' && env.VERSION || github.event.client_payload.version }}
            ${{ vars.REGISTRY }}/${{ github.repository }}:latest
          outputs: type=image,oci-mediatypes=true,compression=zstd,compression-level=3,force-compression=true
